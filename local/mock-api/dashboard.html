<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vpnVPN Local Development Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 16px;
            font-size: 1.3em;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 8px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .status-online {
            background: #10b981;
            color: white;
        }
        
        .status-offline {
            background: #ef4444;
            color: white;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #6b7280;
            font-weight: 500;
        }
        
        .info-value {
            color: #1f2937;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .endpoint {
            background: #f9fafb;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 8px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            color: #374151;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            margin: 20px auto;
            display: block;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
        
        .auto-refresh {
            text-align: center;
            color: white;
            margin-top: 10px;
            opacity: 0.8;
        }
        
        code {
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        .server-list {
            list-style: none;
        }
        
        .server-item {
            padding: 12px;
            background: #f9fafb;
            margin: 8px 0;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        
        .peer-item {
            padding: 12px;
            background: #f0fdf4;
            margin: 8px 0;
            border-radius: 6px;
            border-left: 4px solid #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 vpnVPN</h1>
            <p class="subtitle">Local Development Dashboard</p>
        </header>

        <div id="error-container"></div>
        <div id="content">
            <div class="loading">Loading system information...</div>
        </div>

        <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        <div class="auto-refresh">Auto-refreshing every 10 seconds</div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('/test/info');
                if (!response.ok) throw new Error('Failed to fetch data');
                
                const data = await response.json();
                renderDashboard(data);
                document.getElementById('error-container').innerHTML = '';
            } catch (error) {
                document.getElementById('error-container').innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> ${error.message}
                        <br>Make sure the mock API is running.
                    </div>
                `;
            }
        }

        function renderDashboard(data) {
            const content = document.getElementById('content');
            
            const onlineServers = data.vpn_servers.servers.filter(s => s.status === 'online').length;
            
            content.innerHTML = `
                <div class="grid">
                    <!-- System Status -->
                    <div class="card">
                        <h2>System Status</h2>
                        <div class="info-row">
                            <span class="info-label">Environment</span>
                            <span class="info-value">${data.environment}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Timestamp</span>
                            <span class="info-value">${new Date(data.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Control Plane</span>
                            <span class="status-badge status-online">${data.control_plane.status}</span>
                        </div>
                    </div>

                    <!-- VPN Servers -->
                    <div class="card">
                        <h2>VPN Servers</h2>
                        <div class="info-row">
                            <span class="info-label">Registered</span>
                            <span class="info-value">${data.vpn_servers.registered}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Online</span>
                            <span class="info-value">${onlineServers}</span>
                        </div>
                    </div>

                    <!-- Peers -->
                    <div class="card">
                        <h2>Configured Peers</h2>
                        <div class="info-row">
                            <span class="info-label">Total</span>
                            <span class="info-value">${data.peers.configured}</span>
                        </div>
                    </div>
                </div>

                <!-- Connection Info -->
                <div class="card">
                    <h2>Connection Information</h2>
                    <div class="info-row">
                        <span class="info-label">Control Plane URL</span>
                        <span class="info-value">${data.control_plane.url}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">API Key</span>
                        <span class="info-value">${data.control_plane.api_key}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">VPN Token</span>
                        <span class="info-value">${data.connection_info.token}</span>
                    </div>
                </div>

                <!-- Registered Servers -->
                ${data.vpn_servers.servers.length > 0 ? `
                    <div class="card">
                        <h2>Registered VPN Servers</h2>
                        <ul class="server-list">
                            ${data.vpn_servers.servers.map(srv => `
                                <li class="server-item">
                                    <div><strong>Public Key:</strong> <code>${srv.public_key.substring(0, 32)}...</code></div>
                                    <div><strong>Port:</strong> ${srv.listen_port} <span class="status-badge ${srv.status === 'online' ? 'status-online' : 'status-offline'}">${srv.status}</span></div>
                                    <div><strong>Last Seen:</strong> ${new Date(srv.last_seen).toLocaleString()}</div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                ` : ''}

                <!-- Configured Peers -->
                ${data.peers.list.length > 0 ? `
                    <div class="card">
                        <h2>Configured Peers</h2>
                        <ul class="server-list">
                            ${data.peers.list.map(peer => `
                                <li class="peer-item">
                                    <div><strong>Public Key:</strong> <code>${peer.public_key.substring(0, 32)}...</code></div>
                                    <div><strong>Allowed IPs:</strong> ${peer.allowed_ips.join(', ')}</div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                ` : ''}

                <!-- API Endpoints -->
                <div class="card">
                    <h2>API Endpoints</h2>
                    <h3 style="margin: 16px 0 8px 0; font-size: 1em; color: #374151;">Control Plane</h3>
                    ${Object.entries(data.connection_info.endpoints).map(([name, url]) => `
                        <div class="endpoint">${name}: ${url}</div>
                    `).join('')}
                    
                    ${data.admin_endpoints.length > 0 ? `
                        <h3 style="margin: 16px 0 8px 0; font-size: 1em; color: #374151;">VPN Admin</h3>
                        ${data.admin_endpoints.map(ep => `
                            <div class="endpoint">
                                Health: <a href="${ep.health}" target="_blank">${ep.health}</a><br>
                                Status: <a href="${ep.status}" target="_blank">${ep.status}</a><br>
                                Metrics: <a href="${ep.metrics}" target="_blank">${ep.metrics}</a>
                            </div>
                        `).join('')}
                    ` : ''}
                </div>

                <!-- Quick Start -->
                <div class="card">
                    <h2>Quick Start Commands</h2>
                    ${Object.entries(data.quick_start).map(([name, info]) => `
                        <h3 style="margin: 16px 0 8px 0; font-size: 1em; color: #374151;">${info.description}</h3>
                        <div class="endpoint" style="word-break: break-all;">${info.command}</div>
                    `).join('')}
                </div>
            `;
        }

        // Initial load
        loadData();

        // Auto-refresh every 10 seconds
        setInterval(loadData, 10000);
    </script>
</body>
</html>
