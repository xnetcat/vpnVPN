services:
  # Mock Control Plane API
  mock-api:
    build: ./mock-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    networks:
      - vpn-net

  # VPN Node (Rust Server)
  vpn-node:
    build:
      context: ../vpn-server
      dockerfile: Dockerfile
    cap_add:
      - NET_ADMIN
    environment:
      - API_URL=http://mock-api:8080
      - VPN_TOKEN=dev-token
      - LISTEN_UDP_PORT=51820
      - ADMIN_PORT=9090
      - RUST_LOG=info
      - VPN_PROTOCOLS=wireguard
    ports:
      - "51820:51820/udp"
      - "9090:9090" # Admin/Metrics port
    depends_on:
      - mock-api
    networks:
      - vpn-net
    volumes:
      - ./vpn-data:/etc/wireguard

  # Postgres Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vpnvpn
    ports:
      - "5432:5432"
    networks:
      - vpn-net
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Web App / Admin UI
  web-app:
    build:
      context: ../web-app
      dockerfile: Dockerfile # Assuming standard Next.js Dockerfile exists or will be created, using dev mode for now might be better but let's assume build
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/vpnvpn
      - NEXTAUTH_SECRET=supersecret
      - NEXTAUTH_URL=http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - vpn-net

networks:
  vpn-net:

volumes:
  postgres-data:
