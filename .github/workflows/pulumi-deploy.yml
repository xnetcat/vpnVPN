name: Pulumi Deploy (Global + Region)

on:
  workflow_run:
    workflows: ["Build and Push Rust Server"]
    types: ["completed"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
  ECR_REPO_NAME: ${{ secrets.ECR_REPO_NAME }}
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  CONTROL_PLANE_API_URL: ${{ secrets.CONTROL_PLANE_API_URL }}
  # VPN Node Configuration (optional, with defaults)
  VPN_DESIRED_INSTANCES: ${{ vars.VPN_DESIRED_INSTANCES || '2' }}
  VPN_MIN_INSTANCES: ${{ vars.VPN_MIN_INSTANCES || '1' }}
  VPN_MAX_INSTANCES: ${{ vars.VPN_MAX_INSTANCES || '10' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.event.workflow_run.head_branch == 'main' && 'production' || 'staging') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set defaults
        id: defaults
        run: |
          echo "ECR_REPO_NAME=${ECR_REPO_NAME:-vpnvpn/rust-server}" >> $GITHUB_ENV
          echo "AWS_REGION=${AWS_REGION:-us-east-1}" >> $GITHUB_ENV
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.environment }}" ]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          elif [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            ENVIRONMENT="production"
          else
            ENVIRONMENT="staging"
          fi
          echo "DEPLOY_ENV=${ENVIRONMENT}" >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.1.38"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5
        with:
          pulumi-version: latest

      - name: Install deps
        working-directory: infra/pulumi
        run: bun install

      - name: Pulumi login
        working-directory: infra/pulumi
        run: pulumi login

      - name: Ensure stacks
        working-directory: infra/pulumi
        run: |
          pulumi stack select "global-${DEPLOY_ENV}" || pulumi stack init "global-${DEPLOY_ENV}"
          pulumi stack select "region-us-east-1-${DEPLOY_ENV}" || pulumi stack init "region-us-east-1-${DEPLOY_ENV}"

      - name: Configure global stack
        working-directory: infra/pulumi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CONTROL_PLANE_API_KEY: ${{ secrets.CONTROL_PLANE_API_KEY }}
          BOOTSTRAP_TOKEN: ${{ secrets.VPN_TOKEN }}
        run: |
          pulumi config set aws:region $AWS_REGION --stack "global-${DEPLOY_ENV}"
          pulumi config set global:ecrRepoName $ECR_REPO_NAME --stack "global-${DEPLOY_ENV}"

          # Configure secrets for Lambda deployment (if deploying services)
          if [ -n "$DATABASE_URL" ]; then
            pulumi config set --secret databaseUrl "$DATABASE_URL" --stack "global-${DEPLOY_ENV}"
          fi
          if [ -n "$CONTROL_PLANE_API_KEY" ]; then
            pulumi config set --secret controlPlaneApiKey "$CONTROL_PLANE_API_KEY" --stack "global-${DEPLOY_ENV}"
          fi
          if [ -n "$BOOTSTRAP_TOKEN" ]; then
            pulumi config set --secret bootstrapToken "$BOOTSTRAP_TOKEN" --stack "global-${DEPLOY_ENV}"
          fi

      - name: Pulumi up (global)
        working-directory: infra/pulumi
        run: pulumi up -y --stack "global-${DEPLOY_ENV}"

      - name: Compute image tag
        id: image
        run: |
          echo "tag=sha-${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Configure region stack
        working-directory: infra/pulumi
        run: |
          pulumi config set aws:region $AWS_REGION --stack "region-us-east-1-${DEPLOY_ENV}"
          pulumi config set global:ecrRepoName $ECR_REPO_NAME --stack "region-us-east-1-${DEPLOY_ENV}"
          pulumi config set region:imageTag ${{ steps.image.outputs.tag }} --stack "region-us-east-1-${DEPLOY_ENV}"
          pulumi config set region:desiredInstances ${VPN_DESIRED_INSTANCES:-2} --stack "region-us-east-1-${DEPLOY_ENV}"
          pulumi config set region:minInstances ${VPN_MIN_INSTANCES:-1} --stack "region-us-east-1-${DEPLOY_ENV}"
          pulumi config set region:maxInstances ${VPN_MAX_INSTANCES:-10} --stack "region-us-east-1-${DEPLOY_ENV}"
          pulumi config set region:adminCidr 0.0.0.0/0 --stack "region-us-east-1-${DEPLOY_ENV}"

      - name: Pulumi up (region)
        working-directory: infra/pulumi
        run: pulumi up -y --stack "region-us-east-1-${DEPLOY_ENV}"
