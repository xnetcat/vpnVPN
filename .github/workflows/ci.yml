name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.1.38"

      - name: Install dependencies
        run: |
          bun install

      - name: Lint
        run: |
          bun run lint

      - name: Test
        run: |
          bun run test

      - name: Build
        run: |
          bun run build
