name: Build Desktop App

on:
  push:
    branches: ["main", "staging"]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/desktop-build.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Build environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            artifact_suffix: macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment
        id: env
        shell: bash
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set environment URLs
        id: urls
        shell: bash
        run: |
          if [ "${{ steps.env.outputs.environment }}" == "production" ]; then
            echo "web_url=https://vpnvpn.dev" >> $GITHUB_OUTPUT
            echo "desktop_url=https://vpnvpn.dev/desktop?desktop=1" >> $GITHUB_OUTPUT
          else
            echo "web_url=https://staging.vpnvpn.dev" >> $GITHUB_OUTPUT
            echo "desktop_url=https://staging.vpnvpn.dev/desktop?desktop=1" >> $GITHUB_OUTPUT
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.1.38"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        working-directory: apps/desktop
        run: bun install

      - name: Build frontend
        working-directory: apps/desktop
        env:
          VITE_VPNVPN_DESKTOP_URL: ${{ steps.urls.outputs.desktop_url }}
          VITE_VPNVPN_API_URL: ${{ steps.urls.outputs.web_url }}
        run: bun run build:web

      - name: Ensure macOS .icns icon
        if: startsWith(matrix.platform, 'macos')
        working-directory: apps/desktop/src-tauri/icons
        run: |
          mkdir -p app.iconset
          cp 32x32.png app.iconset/icon_32x32.png
          cp 128x128.png app.iconset/icon_128x128.png
          cp 128x128@2x.png app.iconset/icon_256x256.png
          iconutil -c icns app.iconset -o icon.icns

      - name: Prepare daemon sidecar (Unix)
        if: runner.os != 'Windows'
        working-directory: apps/desktop/src-tauri
        run: bash scripts/prepare-daemon.sh

      - name: Prepare daemon sidecar (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/desktop/src-tauri
        run: pwsh -ExecutionPolicy Bypass -File scripts/prepare-daemon.ps1

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifact_suffix }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: warn

  upload-to-s3:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to S3
        env:
          S3_BUCKET: ${{ secrets.DESKTOP_S3_BUCKET || format('vpnvpn-desktop-{0}', steps.env.outputs.environment) }}
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          S3_PREFIX="releases/${ENVIRONMENT}"

          # Find and upload all artifacts
          for artifact_dir in artifacts/*/; do
            echo "Processing $artifact_dir"

            # Upload DMG files
            for file in $(find "$artifact_dir" -name "*.dmg" 2>/dev/null || true); do
              echo "Uploading $file"
              aws s3 cp "$file" "s3://${S3_BUCKET}/${S3_PREFIX}/$(basename $file)"
            done

            # Upload AppImage files
            for file in $(find "$artifact_dir" -name "*.AppImage" 2>/dev/null || true); do
              echo "Uploading $file"
              aws s3 cp "$file" "s3://${S3_BUCKET}/${S3_PREFIX}/$(basename $file)"
            done

            # Upload DEB files
            for file in $(find "$artifact_dir" -name "*.deb" 2>/dev/null || true); do
              echo "Uploading $file"
              aws s3 cp "$file" "s3://${S3_BUCKET}/${S3_PREFIX}/$(basename $file)"
            done

            # Upload MSI files
            for file in $(find "$artifact_dir" -name "*.msi" 2>/dev/null || true); do
              echo "Uploading $file"
              aws s3 cp "$file" "s3://${S3_BUCKET}/${S3_PREFIX}/$(basename $file)"
            done

            # Upload EXE files (NSIS installer)
            for file in $(find "$artifact_dir" -name "*.exe" 2>/dev/null || true); do
              echo "Uploading $file"
              aws s3 cp "$file" "s3://${S3_BUCKET}/${S3_PREFIX}/$(basename $file)"
            done
          done

          # Create latest symlinks
          echo "Creating latest symlinks..."

          # macOS
          LATEST_DMG=$(aws s3 ls "s3://${S3_BUCKET}/${S3_PREFIX}/" | grep "\.dmg$" | sort -r | head -n1 | awk '{print $4}')
          if [ -n "$LATEST_DMG" ]; then
            aws s3 cp "s3://${S3_BUCKET}/${S3_PREFIX}/${LATEST_DMG}" \
              "s3://${S3_BUCKET}/${S3_PREFIX}/vpnvpn-desktop-latest.dmg"
          fi

          # Linux AppImage
          LATEST_APPIMAGE=$(aws s3 ls "s3://${S3_BUCKET}/${S3_PREFIX}/" | grep "\.AppImage$" | sort -r | head -n1 | awk '{print $4}')
          if [ -n "$LATEST_APPIMAGE" ]; then
            aws s3 cp "s3://${S3_BUCKET}/${S3_PREFIX}/${LATEST_APPIMAGE}" \
              "s3://${S3_BUCKET}/${S3_PREFIX}/vpnvpn-desktop-latest.AppImage"
          fi

          # Windows
          LATEST_EXE=$(aws s3 ls "s3://${S3_BUCKET}/${S3_PREFIX}/" | grep "\.exe$" | sort -r | head -n1 | awk '{print $4}')
          if [ -n "$LATEST_EXE" ]; then
            aws s3 cp "s3://${S3_BUCKET}/${S3_PREFIX}/${LATEST_EXE}" \
              "s3://${S3_BUCKET}/${S3_PREFIX}/vpnvpn-desktop-latest.exe"
          fi

          echo "Upload complete!"
          echo "Download URLs:"
          echo "  macOS: https://${S3_BUCKET}.s3.amazonaws.com/${S3_PREFIX}/vpnvpn-desktop-latest.dmg"
          echo "  Linux: https://${S3_BUCKET}.s3.amazonaws.com/${S3_PREFIX}/vpnvpn-desktop-latest.AppImage"
          echo "  Windows: https://${S3_BUCKET}.s3.amazonaws.com/${S3_PREFIX}/vpnvpn-desktop-latest.exe"
