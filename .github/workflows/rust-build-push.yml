name: Build and Push Rust Server

on:
  push:
    branches: ["main"]
    paths:
      - "apps/vpn-server/**"
      - ".github/workflows/rust-build-push.yml"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPO_NAME: ${{ secrets.ECR_REPO_NAME }}
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
      ECR_URI: ${{ steps.meta.outputs.ecr_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set defaults
        id: defaults
        run: |
          echo "ECR_REPO_NAME=${ECR_REPO_NAME:-vpnvpn/rust-server}" >> $GITHUB_ENV
          echo "AWS_REGION=${AWS_REGION:-us-east-1}" >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image meta
        id: meta
        run: |
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_NAME}"
          IMAGE_TAG="sha-${GITHUB_SHA}"
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Build image
        working-directory: apps/vpn-server
        run: |
          docker build -t ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.image_tag }} .

      - name: Push image
        run: |
          docker push ${{ steps.meta.outputs.ecr_uri }}:${{ steps.meta.outputs.image_tag }}
